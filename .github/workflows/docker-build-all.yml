name: Docker Build All-in-One

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "byclaw-fe/**"
      - "byclaw-be/**"
      - "byclaw-qa/**"
      - "byclaw-data/**"
      - "Dockerfile-all"
      - ".github/workflows/docker-build-all.yml"
  pull_request:
    branches: [master]
    paths:
      - "byclaw-fe/**"
      - "byclaw-be/**"
      - "byclaw-qa/**"
      - "byclaw-data/**"
      - "Dockerfile-all"
      - ".github/workflows/docker-build-all.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/byclaw-all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-all
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=byclaw-all
          cache-to: type=gha,mode=max,scope=byclaw-all
          platforms: linux/amd64

      - name: Output image digest
        run: |
          echo "Image digest: ${{ steps.push.outputs.digest }}"
          echo "Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
