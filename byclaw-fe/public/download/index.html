  <script>
    function downloadAPP() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        // iOS，跳转App Store或TestFlight
        const iosUrl = 'https://apps.apple.com/app/id6753131524'; // App Store
        // const iosUrl = 'https://testflight.apple.com/join/FYyRWEfs'; // testflight
        window.location.href = iosUrl;
      } else {
        // 鸿蒙下载 /OpenHarmony/i.test(navigator.userAgent)
        // 安卓，下载apk /android/i.test(ua)
        const a = document.createElement('a');
        a.href = window.location.origin + '/app/download/app-release.apk';
        a.download = 'app-release.apk';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // alert('请使用鸿蒙、安卓、iOS设备访问本页面以下载安装包。');
      }
    }
  </script>
