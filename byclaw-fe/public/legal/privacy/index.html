      // 转义 HTML 特殊字符
      function escapeHtml(text) {
        if (!text) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // 处理内容，保持换行符
      function formatContent(content) {
        if (!content) return '';
        return escapeHtml(content);
      }

      // 递归生成内容项 HTML
      function renderContentItem(item, numberPrefix) {
        let html = '';

        if (item.content !== undefined) {
          // 如果 showNumber 明确设置为 false，则不显示编号
          const shouldNumber = item.showNumber !== false; // 默认显示编号，除非明确设置为 false
          let contentText = formatContent(item.content);
          let useNumberedClass = false;

          // 如果有序号前缀且需要显示编号，在内容前添加序号
          if (shouldNumber && numberPrefix) {
            contentText = numberPrefix + ' ' + contentText;
            // 当 JavaScript 已添加序号时，不使用 numbered 类（避免 CSS counter 重复显示）
            useNumberedClass = false;
          } else if (shouldNumber && !numberPrefix) {
            // 没有 numberPrefix 但需要显示编号时，使用 numbered 类让 CSS counter 显示
            useNumberedClass = true;
          }
          // 如果 shouldNumber 为 false，则不添加任何序号

          const className = useNumberedClass ? 'content-item numbered' : 'content-item';
          html += `            <div class="${className}">${contentText}</div>\n`;
        }

        if (item.children && item.children.length > 0) {
          let childIndex = 0; // 从 0 开始，遇到需要显示序号的子项时递增
          for (const child of item.children) {
            let childNumberPrefix = null;
            // 只有当父项需要显示编号且子项也需要显示编号时，才为子项生成序号
            if (numberPrefix && item.showNumber !== false && child.showNumber !== false) {
              childIndex++;
              childNumberPrefix = numberPrefix + '.' + childIndex;
            }
            html += renderContentItem(child, childNumberPrefix);
          }
        }

        return html;
      }

      // 生成子部分 HTML（subsection）
      function renderSubsection(item, sectionIndex, subsectionIndex) {
        let html = '';

        if (item.title) {
          // 如果 sectionIndex 为空字符串，说明父 section 的 showNumber 为 false，不显示序号
          const number = sectionIndex ? sectionIndex + '.' + subsectionIndex : '';
          const titleText = number ? `${number} ${escapeHtml(item.title)}` : escapeHtml(item.title);
          html += `          <div class="subsection">\n`;
          html += `            <h3 class="subsection-title">${titleText}</h3>\n`;

          if (item.content) {
            // 如果 subsection 的 showNumber 为 false，内容不显示编号
            if (item.showNumber === false) {
              html += `            <div class="content-item">${formatContent(item.content)}</div>\n`;
            } else {
              html += `            <div class="content-item">${formatContent(item.content)}</div>\n`;
            }
          }

          if (item.children && item.children.length > 0) {
            let subsubsectionIndex = 0; // 从 0 开始，遇到需要显示序号的 subsubsection 时递增
            let contentItemIndex = 0; // 从 0 开始，遇到需要显示序号的内容项时递增
            for (const child of item.children) {
              // 如果 child 有 title，可能是 subsubsection
              if (child.title && child.children) {
                // 如果 subsubsection 需要显示序号，递增计数器
                if (number && child.showNumber !== false) {
                  subsubsectionIndex++;
                }
                const subNumber = number && subsubsectionIndex > 0 ? number + '.' + subsubsectionIndex : '';
                const subTitleText = subNumber ? `${subNumber} ${escapeHtml(child.title)}` : escapeHtml(child.title);
                html += `            <div class="subsubsection">\n`;
                html += `              <h4 class="subsubsection-title">${subTitleText}</h4>\n`;

                if (child.content) {
                  html += `              <div class="content-item">${formatContent(child.content)}</div>\n`;
                }

                if (child.children && child.children.length > 0) {
                  if (child.showNumber === false || !subNumber) {
                    // 如果 child 的 showNumber 为 false 或没有 number，子内容不显示序号
                    for (const subChild of child.children) {
                      html += renderContentItem(subChild, null);
                    }
                  } else {
                    let subContentIndex = 0; // 从 0 开始，遇到需要显示序号的子内容时递增
                    for (const subChild of child.children) {
                      if (subChild.showNumber !== false) {
                        subContentIndex++;
                        const subContentNumber = subNumber + '.' + subContentIndex;
                        html += renderContentItem(subChild, subContentNumber);
                      } else {
                        html += renderContentItem(subChild, null);
                      }
                    }
                  }
                }

                html += `            </div>\n`;
              } else {
                // 普通内容项
                if (item.showNumber === false || child.showNumber === false || !number) {
                  // 如果 subsection 或 child 的 showNumber 为 false，或没有 number，不显示序号
                  html += renderContentItem(child, null);
                } else {
                  // 需要显示序号，递增计数器
                  contentItemIndex++;
                  // 显示三级序号
                  const contentNumber = number + '.' + contentItemIndex;
                  html += renderContentItem(child, contentNumber);
                }
              }
            }
          }

          html += `          </div>\n`;
        } else if (item.content) {
          html += `          <div class="content-item">${formatContent(item.content)}</div>\n`;
        }

        return html;
      }

      // 生成主部分 HTML（section）
      function renderSection(item, sectionIndex) {
        let html = '';

        if (item.title) {
          html += `        <!-- ${escapeHtml(item.title)} -->\n`;
          html += `        <div class="section">\n`;

          // 如果 showNumber 为 false 或 sectionIndex 为 0，则不显示 section 标题的序号
          const sectionTitle =
            item.showNumber === false || sectionIndex === 0
              ? escapeHtml(item.title)
              : `${sectionIndex} ${escapeHtml(item.title)}`;
          html += `          <h2 class="section-title">${sectionTitle}</h2>\n`;

          if (item.content) {
            // 如果 section 的 showNumber 为 false，内容也不显示编号
            if (item.showNumber === false) {
              html += `          <div class="content-item">${formatContent(item.content)}</div>\n`;
            } else {
              html += `          <div class="content-item">${formatContent(item.content)}</div>\n`;
            }
          }

          if (item.children && item.children.length > 0) {
            let subsectionIndex = 0; // 从 0 开始，遇到需要显示序号的 subsection 时递增
            let directContentIndex = 0; // 从 0 开始，遇到需要显示序号的内容项时递增
            for (const child of item.children) {
              if (child.title) {
                // 如果 section 和 subsection 都需要显示序号，递增计数器
                if (item.showNumber !== false && sectionIndex > 0 && child.showNumber !== false) {
                  subsectionIndex++;
                }
                // 如果 section 的 showNumber 为 false 或 sectionIndex 为 0，subsection 也不显示序号
                if (item.showNumber === false || sectionIndex === 0) {
                  html += renderSubsection(child, '', subsectionIndex);
                } else {
                  html += renderSubsection(child, sectionIndex, subsectionIndex);
                }
              } else if (child.content) {
                // section 下的直接内容项
                if (item.showNumber === false || sectionIndex === 0 || child.showNumber === false) {
                  // 如果 section 或 child 的 showNumber 为 false，或 sectionIndex 为 0，不显示序号
                  html += renderContentItem(child, null);
                } else {
                  // 需要显示序号，递增计数器
                  directContentIndex++;
                  // 显示二级序号
                  const contentNumber = sectionIndex + '.' + directContentIndex;
                  html += renderContentItem(child, contentNumber);
                }
              } else if (child.children) {
                // 如果 section 的 showNumber 为 false 或 sectionIndex 为 0，子内容也不显示序号
                if (item.showNumber === false || sectionIndex === 0) {
                  for (const subChild of child.children) {
                    html += renderContentItem(subChild, null);
                  }
                } else {
                  let subContentIndex = 0; // 从 0 开始，遇到需要显示序号的子内容时递增
                  for (const subChild of child.children) {
                    if (subChild.showNumber !== false) {
                      subContentIndex++;
                      const subContentNumber = sectionIndex + '.' + subContentIndex;
                      html += renderContentItem(subChild, subContentNumber);
                    } else {
                      html += renderContentItem(subChild, null);
                    }
                  }
                }
              }
            }
          }

          html += `        </div>\n`;
        }

        return html;
      }

      // 生成完整的 HTML 内容
      function generateContent() {
        let html = '';
        let sectionIndex = 0; // 从 0 开始，遇到需要显示序号的 section 时递增
        for (const item of privacyContent) {
          // 如果 section 需要显示序号，递增计数器；否则保持当前值（下一个需要显示序号的会从 1 开始）
          if (item.showNumber !== false) {
            sectionIndex++;
          }
          html += renderSection(item, sectionIndex);
        }
        return html;
      }

      // 页面加载完成后生成内容
      document.addEventListener('DOMContentLoaded', function () {
        const contentDiv = document.querySelector('.content');
        if (contentDiv) {
          contentDiv.innerHTML = generateContent();
        }
      });
    </script>
    <div class="container">
      <div class="header">
        <h1>【鲸智百应】隐私政策</h1>
        <div class="meta">
          <span>更新日期：2026年01月28日</span>
          <span>生效日期：2026年01月01日</span>
        </div>
      </div>
      <div class="content">
        <!-- 内容将通过 JavaScript 动态生成 -->
      </div>
    </div>
  </body>
</html>
