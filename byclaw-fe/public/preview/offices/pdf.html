<!DOCTYPE html>
<html lang="en">
  <head>
    <title>PDF</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <script type="module" crossorigin src="./assets/pdf-BSuL28ze.js"></script>
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .loader {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader span {
      font-size: 40px;
      font-family: system-ui, sans-serif;
      font-weight: bold;
      color: #165dff00;
      -webkit-text-stroke: 1px #165dff;
      text-transform: uppercase;
      background: linear-gradient(-60deg, #165dff00 33%, #165dff 0 67%, #165dff00 0) 0/300% 100% no-repeat text;
      animation: l2 10s linear infinite;
    }

    .loader span:before {
      content: 'Beyond AI';
    }

    @keyframes l2 {
      0% {
        background-position: 100%;
      }
    }
  </style>
  <script>
    const clamp = (val, min = 0, max = 1) => Math.max(min, Math.min(val, max));

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      let url = urlParams.get('url');
      if (url && jsPreviewPdf) {
        url = decodeURIComponent(url);
        if (!url.startsWith('http')) {
          url = window.location.origin + url;
        }
        const info = {
          count: 0,
          total: 0,
        };
        const dom = document.getElementById('app');

        let loader = document.createElement('div');
        loader.appendChild(document.createElement('span'));
        loader.className = 'loader';
        document.body.appendChild(loader);

        // jsPreviewPdf 已加载
        const pdf = jsPreviewPdf.init(dom, {
          onError: (e) => {
            loader.remove();
            loader = null;

            document.body.innerText = '预览失败';
          },
          onRendered: () => {
            if (loader) {
              loader.remove();
              loader = null;
            }

            if (info.total) return;

            info.count = pdf.visibleItems;
            info.total = pdf.totalItems;
          },
        });

        pdf.preview(url);

        const scroll = (e) => {
          if (info.count === info.total) return;

          const dom = e.target;
          const max = dom.scrollHeight - 60;
          const per = max / info.total;
          const idx = Math.ceil(dom.scrollTop / per);
          if (info.count - idx < 4) {
            info.count = clamp(info.count + 5, 1, info.total);
            pdf.renderList(0, info.count);
          }
        };

        dom.onscroll = scroll;
      }
    };
  </script>
  <body>
    <div id="app" style="width: 100vw; height: 100vh"></div>
  </body>
</html>
