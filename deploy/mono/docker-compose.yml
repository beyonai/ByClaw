services:
  byclaw-all:
    image: ${IMAGE_ALL:-ghcr.io/beyonclaw/byclaw-all/byclaw-all:main}
    container_name: byclaw-all-${CONTAINER_SUFFIX:-mono}
    user: root
    ports:
      - "${NGINX_PORT:-8080}:8080"
      - "${BE_SERVER_PORT:-8086}:8086"
      - "${BE_WS_PORT:-8082}:8082"
      - "${BYCLAW_QA_PORT:-8090}:8090"
    env_file:
      - ../../.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config/nginx-mono.conf:/etc/nginx/conf.d/default.conf
      - ../config:/app/be/config
      - ./logs/nginx:/var/log/nginx
      - ./logs/be:/app/be/logs
      - ./logs/qa:/app/qa/logs
      - /data/byai/openclaw/:/data/byai/openclaw/
    networks:
      - byclaw-network
    restart: unless-stopped

networks:
  byclaw-network:
    name: byclaw-network-${CONTAINER_SUFFIX:-default}
    driver: bridge
