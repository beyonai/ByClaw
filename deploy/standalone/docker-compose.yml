services:
  fe:
    image: ${IMAGE_FE:-ghcr.io/beyonclaw/byclaw-all/byclaw-fe:main}
    container_name: byclaw-fe-${CONTAINER_SUFFIX:-standalone}
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config/nginx-standalone.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    networks:
      - byclaw-network
    depends_on:
      - be
    restart: unless-stopped

  be:
    image: ${IMAGE_BE:-ghcr.io/beyonclaw/byclaw-all/byclaw-be:main}
    #image: byclaw-be:local
    container_name: byclaw-be-${CONTAINER_SUFFIX:-standalone}
    user: root
    ports:
      - "${BE_SERVER_PORT:-8086}:${BE_SERVER_PORT:-8086}"
      - "${BE_WS_PORT:-8082}:${BE_WS_PORT:-8082}"
    env_file:
      - ../../.env
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g -XX:TieredStopAtLevel=1 -XX:+UseParallelGC -Dspring.jmx.enabled=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config:/app/config
      - ./logs/be:/app/logs
    networks:
      - byclaw-network
    restart: unless-stopped

  qa-manager:
    image: ${IMAGE_QA:-ghcr.io/beyonclaw/byclaw-all/byclaw-qa:main}
    container_name: byclaw-qa-manager-${CONTAINER_SUFFIX:-standalone}
    user: root
    command: api
    ports:
      - "${BYCLAW_QA_PORT:-8000}:${BYCLAW_QA_PORT:-8000}"
    env_file:
      - ../../.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config:/app/config
      - ./logs/qa:/app/logs
    networks:
      - byclaw-network
    restart: unless-stopped

  qa-worker:
    image: ${IMAGE_QA:-ghcr.io/beyonclaw/byclaw-all/byclaw-qa:main}
    container_name: byclaw-qa-worker-${CONTAINER_SUFFIX:-standalone}
    user: root
    command: worker
    env_file:
      - ../../.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config:/app/config
      - ./logs/qa:/app/logs
    networks:
      - byclaw-network
    restart: unless-stopped

  data:
    image: ${IMAGE_DATA:-ghcr.io/beyonclaw/byclaw-all/byclaw-data:main}
    container_name: byclaw-data-${CONTAINER_SUFFIX:-standalone}
    user: root
    ports:
      - "${DATACLOUD_PORT:-8087}:${DATACLOUD_PORT:-8087}"
    env_file:
      - ../../.env
    environment:
      - JAVA_OPTS=-Xms256m -Xmx1g -XX:TieredStopAtLevel=1 -XX:+UseParallelGC -Dspring.jmx.enabled=false
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config:/app/config
      - ./logs/data:/app/logs
      - ${FILE_STORAGE_MINIO_MOUNT_PATH:-/data/byclaw}:${FILE_STORAGE_MINIO_MOUNT_PATH:-/data/byclaw}
    networks:
      - byclaw-network
    restart: unless-stopped

  demo:
    image: ${IMAGE_DEMO:-ghcr.io/beyonai/byclaw-middleware/byclaw-demo:main}
    container_name: byclaw-demo-${CONTAINER_SUFFIX:-standalone}
    profiles:
      - demo
    user: root
    ports:
      - "${APIDEMO_PORT:-8999}:${APIDEMO_PORT:-8999}"
    env_file:
      - ../../.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config/logback.xml:/app/config/logback.xml:ro
      - ./logs/demo:/app/logs
    networks:
      - byclaw-network
    restart: unless-stopped

networks:
  byclaw-network:
    name: byclaw-network-${CONTAINER_SUFFIX:-default}
    driver: bridge
