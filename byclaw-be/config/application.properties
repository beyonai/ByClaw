#------------------------------------------------------
# Application Configuration
#------------------------------------------------------
# Application name and context path configuration
spring.application.name=${BE_DOMAINNAME:ByaiService}
spring.application.qADomainName=${QA_DOMAINNAME:}
server.servlet.context-path=/byaiService
server.port=${BE_SERVER_PORT:8086}
netty.port=${BE_WS_PORT:8082}

spring.aop.auto=true

#------------------------------------------------------
# Database Configuration (PostgreSQL/GaussDB)
#------------------------------------------------------
# Database connection settings
spring.datasource.byai.type=jdbc
spring.datasource.byai.dbType=postgresql
spring.datasource.byai.jndiName=java:comp/env/jdbc/ZBDP
spring.datasource.byai.driverClassName=org.postgresql.Driver
spring.datasource.byai.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?currentSchema=${DB_SCHEMA}&characterEncoding=utf8&serverTimezone=Asia/Shanghai&timeZone=GMT+8
spring.datasource.byai.username=${DB_USER:}
spring.datasource.byai.password=${DB_PASS:}
spring.datasource.byai.encrypt=false

# Connection pool settings
spring.datasource.byai.initialSize=4
spring.datasource.byai.maxActive=500
spring.datasource.byai.testOnBorrow=false
spring.datasource.byai.testWhileIdle=true
spring.datasource.byai.timeBetweenEvictionRunsMillis=60000
spring.datasource.byai.minEvictableIdleTimeMillis=300000
spring.datasource.byai.maxEvictableIdleTimeMillis=900000
spring.datasource.byai.keepAliveBetweenTimeMillis=120000
spring.datasource.byai.removeAbandoned=true
spring.datasource.byai.removeAbandonedTimeout=180
spring.datasource.byai.logAbandoned=true
spring.datasource.byai.validationQuery=SELECT 1

#------------------------------------------------------
# Redis Configuration
#------------------------------------------------------
# Basic connection settings
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.username=${REDIS_USERNAME:default}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DATABASE:0}
spring.redis.encrypt=false

#------------------------------------------------------
# Digital employee change notifications (Redis Pub/Sub broadcast)
#------------------------------------------------------
byai.dig-employee-change.publish-enabled=true
byai.dig-employee-change.pubsub-channel=byai:pub:dig_employee_change
byai.dig-employee-change.auth-refresh-enabled=false
byai.dig-employee-change.subscriber.enabled=false

# Spring Session ????? Redis?
spring.session.store-type=redis
spring.session.redis.namespace=common_system
spring.session.redis-serializer=json
spring.servlet.session.store-type=redis
spring.servlet.session.cookie.name=SESSION
server.servlet.session.cookie.max-age=1800
server.servlet.session.timeout=24h

#------------------------------------------------------
# Server Configuration
#------------------------------------------------------
server.tomcat.basedir=/tmp

#------------------------------------------------------
# File Upload Configuration
#------------------------------------------------------
# Maximum file size for uploads (2GB)
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB

#------------------------------------------------------
# Tomcat Configuration
#------------------------------------------------------
# Maximum size for HTTP post form data
server.tomcat.max-http-form-post-size=300MB
# Maximum number of connections
server.tomcat.max-connections=3000
# Maximum worker threads
server.tomcat.threads.max=800
# Minimum spare threads
server.tomcat.threads.min-spare=100
# Accept queue length
server.tomcat.accept-count=100
# Connection timeout
server.connection-timeout=20000ms
# Disable Spring Security's basic authentication
spring.security.basic.enabled=false

#------------------------------------------------------
# Logging Configuration
#------------------------------------------------------
# Path to logback configuration file
logging.config=config/logback.xml
logging.level.root=INFO
logging.level.com.iwhalecloud=DEBUG

#------------------------------------------------------
# Feign Client ConfigurationCo
#------------------------------------------------------
# Connection and read timeout settings (in milliseconds)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

feign.whale-agent.url=${WHALE_AGENT_URL:http://127.0.0.1:19901}
#------------------------------------------------------
# MyBatis Configuration
#------------------------------------------------------
# Location of mapper XML files
mybatis.mapper-locations=classpath*:*.xml

#------------------------------------------------------
# Jackson JSON Configuration
#------------------------------------------------------
# Time zone and date format settings for JSON serialization
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

#------------------------------------------------------
# File storage type
#------------------------------------------------------
file.storage.type=${FILE_STORAGE_TYPE:minio}

#------------------------------------------------------
# FTP / SFTP (file storage)
#------------------------------------------------------
file.storage.ftp.host=${FILE_STORAGE_FTP_HOST:}
file.storage.ftp.user=${FILE_STORAGE_FTP_USER:}
file.storage.ftp.pwd=${FILE_STORAGE_FTP_PWD:}
file.storage.ftp.port=${FILE_STORAGE_FTP_PORT:22}
file.storage.ftp.path=${FILE_STORAGE_FTP_PATH:}

#------------------------------------------------------
# MinIO (file storage / user bucket provisioning)
#------------------------------------------------------
file.storage.minio.host=${FILE_STORAGE_MINIO_HOST:}
file.storage.minio.api.port=${FILE_STORAGE_MINIO_API_PORT:}
file.storage.minio.ui.port=${FILE_STORAGE_MINIO_UI_PORT:}
file.storage.minio.access_key=${FILE_STORAGE_MINIO_ACCESS_KEY:}
file.storage.minio.secret_key=${FILE_STORAGE_MINIO_SECRET_KEY:}
file.storage.minio.secure=${FILE_STORAGE_MINIO_SECURE:false}
file.storage.minio.bucket_name=${FILE_STORAGE_MINIO_BUCKET_NAME:byclaw}

file.storage.minio.mount.enabled=${FILE_STORAGE_MINIO_MOUNT_ENABLED:false}
file.storage.minio.mount.path=${FILE_STORAGE_MINIO_MOUNT_PATH:}
file.storage.minio.mount.targets[0].host=${FILE_STORAGE_MINIO_MOUNT_TARGET_0_HOST:}
file.storage.minio.mount.targets[0].port=${FILE_STORAGE_MINIO_MOUNT_TARGET_0_PORT:22}
file.storage.minio.mount.targets[0].user=${FILE_STORAGE_MINIO_MOUNT_TARGET_0_USER:}
file.storage.minio.mount.targets[0].password=${FILE_STORAGE_MINIO_MOUNT_TARGET_0_PASSWORD:}
file.storage.minio.mount.targets[0].enabled=${FILE_STORAGE_MINIO_MOUNT_TARGET_0_ENABLED:false}
file.storage.minio.mount.targets[1].host=${FILE_STORAGE_MINIO_MOUNT_TARGET_1_HOST:}
file.storage.minio.mount.targets[1].port=${FILE_STORAGE_MINIO_MOUNT_TARGET_1_PORT:22}
file.storage.minio.mount.targets[1].user=${FILE_STORAGE_MINIO_MOUNT_TARGET_1_USER:}
file.storage.minio.mount.targets[1].password=${FILE_STORAGE_MINIO_MOUNT_TARGET_1_PASSWORD:}
file.storage.minio.mount.targets[1].enabled=${FILE_STORAGE_MINIO_MOUNT_TARGET_1_ENABLED:false}

#------------------------------------------------------
# DingTalk Stream Bot Configuration
#------------------------------------------------------
dingtalk.stream.enabled=${DINGTALK_STREAM_ENABLE:false}

# gateway registry.
gateway.discovery.host=${HOST:localhost}
gateway.discovery.port=${BE_SERVER_PORT:8086}

#------------------------------------------------------
# Sandbox Configuration
#------------------------------------------------------
byclaw.sandbox.jdbc.enabled=${BYCLAW_SANDBOX_ENABLE:true}
byclaw.sandbox.opensandbox.base-url=${BYCLAW_SANDBOX_BASE_URL:http://127.0.0.1:8090}
byclaw.sandbox.opensandbox.api-key=${BYCLAW_SANDBOX_API_KEY:dev}
byclaw.sandbox.opensandbox.endpoint-scheme=${BYCLAW_SANDBOX_ENDPOINT_SCHEME:http}
byclaw.sandbox.permanentKeep=${BYCLAW_SANDBOX_PERMANENT_KEEP:true}
byclaw.sandbox.storageMode=${BYCLAW_SANDBOX_STORAGE_MODE:sftp}
byclaw.sandbox.heartbeat-timeout=${BYCLAW_SANDBOX_HEARTBEAT_TIMEOUT:PT5M}
byclaw.sandbox.default-lease-policy=${BYCLAW_SANDBOX_DEFAULT_LEASE_POLICY:REMOTE_AUTO_EXPIRE}
byclaw.sandbox.renew-ahead-seconds=${BYCLAW_SANDBOX_RENEW_AHEAD_SECONDS:120}
byclaw.sandbox.renew-batch-size=${BYCLAW_SANDBOX_RENEW_BATCH_SIZE:100}
byclaw.sandbox.reconcile-batch-size=${BYCLAW_SANDBOX_RECONCILE_BATCH_SIZE:100}
sandbox.idle.timeout.minutes=${SANDBOX_IDLE_TIMEOUT_MINUTES:30}
sandbox.cleanup.fixed-delay=${SANDBOX_CLEANUP_FIXED_DELAY:60000}
sandbox.reconcile.fixed-delay=${SANDBOX_RECONCILE_FIXED_DELAY:60000}

#------------------------------------------------------
# Knowledge Type
#------------------------------------------------------
dataset.system=${DATASET_SYSTEM:}

#------------------------------------------------------
# Actuator Health Check
#------------------------------------------------------
management.health.elasticsearch.enabled=false
